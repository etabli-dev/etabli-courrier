name: release-apk

# Triggered on every annotated tag matching v*. Builds split-per-ABI APKs,
# generates SHA-256 sums, and attaches them + the AAB to a GitHub Release.
# Manual dispatch supported for dry runs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      # Sanity gate — never publish a release if the analyzer or tests fail.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Split-per-ABI APKs (armeabi-v7a, arm64-v8a, x86_64). F-Droid prefers
      # split APKs for size; Play accepts them via the bundle path too.
      - name: Build split APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --dart-define=FUNDING_FLAVOR=bmc

      - name: Build AAB (Play submission)
        run: |
          flutter build appbundle \
            --release \
            --dart-define=FUNDING_FLAVOR=bmc

      - name: Generate SHA-256 sums
        run: |
          cd build/app/outputs
          find . -name '*.apk' -o -name '*.aab' | sort \
            | xargs shasum -a 256 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/SHA256SUMS.txt
            NOTICE
            LICENSE
